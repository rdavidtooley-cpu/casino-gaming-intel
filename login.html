<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casino Gaming Intel — Sign In</title>
<style>
:root { --bg: #0f1923; --card: #1a2332; --border: #2a3a4a; --accent: #ffd700; --text: #e8eaed; --text2: #9aa0a6; --positive: #4caf50; --negative: #f44336; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.auth-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 420px; max-width: 90vw; }
.logo { text-align: center; margin-bottom: 28px; }
.logo h1 { font-size: 22px; color: var(--accent); font-weight: 800; }
.logo p { font-size: 13px; color: var(--text2); margin-top: 6px; }
.auth-tabs { display: flex; gap: 4px; padding: 4px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 24px; }
.auth-tab { flex: 1; padding: 10px; text-align: center; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text2); transition: all 0.2s; }
.auth-tab.active { background: var(--accent); color: #000; }
.form-group { margin-bottom: 16px; }
.form-group label { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; display: block; }
.form-group input { width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: rgba(255,255,255,0.05); color: var(--text); }
.form-group input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 2px rgba(245,197,24,0.15); }
.btn { width: 100%; padding: 12px; font-size: 15px; font-weight: 700; border-radius: 8px; border: none; cursor: pointer; margin-top: 8px; background: var(--accent); color: #000; }
.btn:hover { opacity: 0.9; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.msg { padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
.msg.error { display: block; background: rgba(244,67,54,0.15); color: #ff6b6b; border: 1px solid rgba(244,67,54,0.3); }
.msg.success { display: block; background: rgba(76,175,80,0.15); color: #81c784; border: 1px solid rgba(76,175,80,0.3); }
.pending-msg { text-align: center; padding: 32px 20px; }
.pending-msg .icon { font-size: 48px; margin-bottom: 12px; }
.pending-msg h3 { font-size: 18px; margin-bottom: 8px; color: var(--accent); }
.pending-msg p { font-size: 13px; color: var(--text2); line-height: 1.6; }
</style>
</head>
<body>
<div class="auth-card">
    <div class="logo">
        <h1>Casino Gaming Intel</h1>
        <p>Casino & iGaming Intelligence Platform</p>
    </div>

    <div id="msg" class="msg"></div>

    <div id="auth-tabs" class="auth-tabs">
        <div class="auth-tab active" onclick="showTab('login')">Sign In</div>
        <div class="auth-tab" onclick="showTab('register')">Request Access</div>
    </div>

    <form id="login-form" onsubmit="doLogin(event)">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="login-email" placeholder="you@company.com" required autocomplete="email">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="Your password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn" id="login-btn">Sign In</button>
    </form>

    <form id="register-form" style="display:none" onsubmit="doRegister(event)">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="reg-name" placeholder="John Smith" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="reg-email" placeholder="you@company.com" required autocomplete="email">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="reg-password" placeholder="Minimum 6 characters" required minlength="6" autocomplete="new-password">
        </div>
        <button type="submit" class="btn" id="reg-btn">Request Access</button>
    </form>

    <div id="pending-msg" class="pending-msg" style="display:none">
        <div class="icon">&#9203;</div>
        <h3>Request Submitted</h3>
        <p>Your access request has been submitted. An admin will review it shortly. You'll be able to sign in once approved.</p>
    </div>
</div>

<script>
function showTab(tab) {
    document.querySelectorAll('.auth-tab').forEach(function(t, i) { t.classList.toggle('active', (tab === 'login' ? i === 0 : i === 1)); });
    document.getElementById('login-form').style.display = tab === 'login' ? '' : 'none';
    document.getElementById('register-form').style.display = tab === 'register' ? '' : 'none';
    document.getElementById('pending-msg').style.display = 'none';
    document.getElementById('msg').className = 'msg';
    document.getElementById('msg').style.display = 'none';
}

function showMsg(text, type) {
    var el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
    el.style.display = 'block';
}

async function doLogin(e) {
    e.preventDefault();
    var btn = document.getElementById('login-btn');
    btn.disabled = true; btn.textContent = 'Signing in...';
    document.getElementById('msg').style.display = 'none';
    try {
        var resp = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                email: document.getElementById('login-email').value,
                password: document.getElementById('login-password').value
            })
        });
        var data = await resp.json();
        if (!resp.ok) { showMsg(data.error || 'Login failed.', 'error'); btn.disabled = false; btn.textContent = 'Sign In'; return; }
        localStorage.setItem('cgi_token', data.token);
        localStorage.setItem('cgi_user', JSON.stringify(data.user));
        window.location.href = '/';
    } catch (err) { showMsg('Connection error. Please try again.', 'error'); }
    btn.disabled = false; btn.textContent = 'Sign In';
}

async function doRegister(e) {
    e.preventDefault();
    var btn = document.getElementById('reg-btn');
    btn.disabled = true; btn.textContent = 'Submitting...';
    document.getElementById('msg').style.display = 'none';
    try {
        var resp = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name: document.getElementById('reg-name').value,
                email: document.getElementById('reg-email').value,
                password: document.getElementById('reg-password').value
            })
        });
        var data = await resp.json();
        if (!resp.ok) { showMsg(data.error || 'Registration failed.', 'error'); btn.disabled = false; btn.textContent = 'Request Access'; return; }
        if (data.status === 'approved') {
            showMsg(data.message, 'success');
            setTimeout(function() { showTab('login'); }, 2000);
        } else {
            document.getElementById('register-form').style.display = 'none';
            document.getElementById('auth-tabs').style.display = 'none';
            document.getElementById('pending-msg').style.display = '';
        }
    } catch (err) { showMsg('Connection error. Please try again.', 'error'); }
    btn.disabled = false; btn.textContent = 'Request Access';
}

// If already logged in, redirect to home
(async function() {
    var token = localStorage.getItem('cgi_token');
    if (!token) return;
    try {
        var resp = await fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + token } });
        if (resp.ok) window.location.href = '/';
    } catch(e) {}
})();
</script>
</body>
</html>
