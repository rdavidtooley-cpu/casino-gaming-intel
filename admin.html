<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casino Gaming Intel — Admin</title>
<style>
:root { --bg: #0f1923; --card: #1a2332; --border: #2a3a4a; --accent: #ffd700; --text: #e8eaed; --text2: #9aa0a6; --positive: #4caf50; --negative: #f44336; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.header h1 { font-size: 22px; color: var(--accent); }
.header-right { display: flex; align-items: center; gap: 16px; }
.header-right a { color: var(--accent); text-decoration: none; font-size: 13px; }
.header-right a:hover { text-decoration: underline; }
.btn-logout { background: none; border: 1px solid var(--border); color: var(--text2); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }
.btn-logout:hover { border-color: var(--text2); color: var(--text); }
.section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
.section h2 { font-size: 15px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.section h2 .count { background: var(--accent); color: #000; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 8px 10px; color: var(--text2); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.04); }
.role-badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; }
.role-admin { background: rgba(245,197,24,0.2); color: var(--accent); }
.role-user { background: rgba(76,175,80,0.2); color: var(--positive); }
.role-pending { background: rgba(255,152,0,0.2); color: #ff9800; }
.role-rejected { background: rgba(244,67,54,0.2); color: var(--negative); }
.btn-action { padding: 5px 12px; border-radius: 5px; border: none; cursor: pointer; font-size: 11px; font-weight: 600; margin-right: 4px; }
.btn-approve { background: var(--positive); color: #fff; }
.btn-reject { background: var(--negative); color: #fff; }
.btn-promote { background: var(--accent); color: #000; }
.btn-remove { background: transparent; border: 1px solid var(--negative); color: var(--negative); }
.btn-action:hover { opacity: 0.85; }
.empty { color: var(--text2); font-size: 13px; padding: 16px 0; text-align: center; }
#loading { text-align: center; color: var(--text2); padding: 40px; }
</style>
</head>
<body>
<div class="header">
    <h1>Admin Panel</h1>
    <div class="header-right">
        <a href="/">Back to Dashboard</a>
        <button class="btn-logout" onclick="doLogout()">Sign Out</button>
    </div>
</div>

<div id="loading">Loading users...</div>
<div id="content" style="display:none">
    <div class="section" id="pending-section">
        <h2>Pending Requests <span class="count" id="pending-count">0</span></h2>
        <div id="pending-list"></div>
    </div>
    <div class="section">
        <h2>Active Users <span class="count" id="active-count">0</span></h2>
        <div id="active-list"></div>
    </div>
    <div class="section">
        <h2>Rejected / Removed</h2>
        <div id="rejected-list"></div>
    </div>
</div>

<script>
var TOKEN = localStorage.getItem('cgi_token');

async function checkAdmin() {
    if (!TOKEN) { window.location.href = '/login.html'; return false; }
    try {
        var resp = await fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + TOKEN } });
        if (!resp.ok) { window.location.href = '/login.html'; return false; }
        var data = await resp.json();
        if (data.user.role !== 'admin') { window.location.href = '/'; return false; }
        return true;
    } catch(e) { window.location.href = '/login.html'; return false; }
}

function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function fmtDate(iso) {
    if (!iso) return '--';
    var d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function renderUsers(users) {
    var pending = users.filter(function(u) { return u.role === 'pending'; });
    var active = users.filter(function(u) { return u.role === 'user' || u.role === 'admin'; });
    var rejected = users.filter(function(u) { return u.role === 'rejected'; });

    document.getElementById('pending-count').textContent = pending.length;
    document.getElementById('active-count').textContent = active.length;
    document.getElementById('pending-section').style.display = pending.length ? '' : 'none';

    if (!pending.length) {
        document.getElementById('pending-list').innerHTML = '<div class="empty">No pending requests.</div>';
    } else {
        var html = '<table><thead><tr><th>Name</th><th>Email</th><th>Requested</th><th>Actions</th></tr></thead><tbody>';
        pending.forEach(function(u) {
            html += '<tr><td><strong>' + esc(u.name) + '</strong></td><td>' + esc(u.email) + '</td><td>' + fmtDate(u.created_at) + '</td>' +
                '<td><button class="btn-action btn-approve" onclick="userAction(\'' + esc(u.email) + '\',\'approve\')">Approve</button>' +
                '<button class="btn-action btn-reject" onclick="userAction(\'' + esc(u.email) + '\',\'reject\')">Reject</button></td></tr>';
        });
        html += '</tbody></table>';
        document.getElementById('pending-list').innerHTML = html;
    }

    if (!active.length) {
        document.getElementById('active-list').innerHTML = '<div class="empty">No active users.</div>';
    } else {
        var html = '<table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Last Login</th><th>Actions</th></tr></thead><tbody>';
        active.forEach(function(u) {
            var badge = '<span class="role-badge role-' + u.role + '">' + u.role + '</span>';
            var actions = u.role === 'admin' ? '<span style="color:var(--text2);font-size:11px;">--</span>' :
                '<button class="btn-action btn-promote" onclick="userAction(\'' + esc(u.email) + '\',\'make-admin\')">Make Admin</button>' +
                '<button class="btn-action btn-remove" onclick="userAction(\'' + esc(u.email) + '\',\'remove\')">Remove</button>';
            html += '<tr><td><strong>' + esc(u.name) + '</strong></td><td>' + esc(u.email) + '</td><td>' + badge + '</td><td>' + fmtDate(u.last_login) + '</td><td>' + actions + '</td></tr>';
        });
        html += '</tbody></table>';
        document.getElementById('active-list').innerHTML = html;
    }

    if (!rejected.length) {
        document.getElementById('rejected-list').innerHTML = '<div class="empty">No rejected users.</div>';
    } else {
        var html = '<table><thead><tr><th>Name</th><th>Email</th><th>Requested</th><th>Actions</th></tr></thead><tbody>';
        rejected.forEach(function(u) {
            html += '<tr><td>' + esc(u.name) + '</td><td style="color:var(--text2)">' + esc(u.email) + '</td><td>' + fmtDate(u.created_at) + '</td>' +
                '<td><button class="btn-action btn-approve" onclick="userAction(\'' + esc(u.email) + '\',\'approve\')">Re-approve</button></td></tr>';
        });
        html += '</tbody></table>';
        document.getElementById('rejected-list').innerHTML = html;
    }
}

async function loadUsers() {
    try {
        var resp = await fetch('/api/admin/users', { headers: { 'Authorization': 'Bearer ' + TOKEN } });
        if (!resp.ok) throw new Error('Failed');
        var data = await resp.json();
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = '';
        renderUsers(data.users || []);
    } catch(e) {
        document.getElementById('loading').textContent = 'Failed to load users.';
    }
}

async function userAction(email, action) {
    try {
        var resp = await fetch('/api/admin/users', {
            method: 'PATCH',
            headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email, action: action })
        });
        if (resp.ok) loadUsers();
    } catch(e) {}
}

function doLogout() {
    fetch('/api/auth/logout', { method: 'POST', headers: { 'Authorization': 'Bearer ' + TOKEN } });
    localStorage.removeItem('cgi_token');
    localStorage.removeItem('cgi_user');
    window.location.href = '/login.html';
}

(async function() {
    if (await checkAdmin()) loadUsers();
})();
</script>
</body>
</html>
